AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Class Booking Portal - Standalone Template
  Minimal cost serverless architecture for class booking management.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Environment name

  ProjectName:
    Type: String
    Default: class-booking
    Description: Project name for resource naming

Conditions:
  IsProd: !Equals [!Ref Environment, "prod"]

Resources:
  # ===========================================================================
  # DATABASE - DynamoDB
  # ===========================================================================
  ClassesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "${ProjectName}-${Environment}-classes"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: classId
          AttributeType: S
      KeySchema:
        - AttributeName: classId
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  BookingsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "${ProjectName}-${Environment}-bookings"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: bookingId
          AttributeType: S
        - AttributeName: classId
          AttributeType: S
      KeySchema:
        - AttributeName: bookingId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: classId-index
          KeySchema:
            - AttributeName: classId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  FeedbackTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "${ProjectName}-${Environment}-feedback"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: bookingId
          AttributeType: S
        - AttributeName: classId
          AttributeType: S
      KeySchema:
        - AttributeName: bookingId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: classId-index
          KeySchema:
            - AttributeName: classId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ===========================================================================
  # AUTHENTICATION - Cognito (admin only)
  # ===========================================================================
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${ProjectName}-${Environment}-users"
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Schema:
        - Name: email
          Required: true
          Mutable: true
        - Name: name
          Required: false
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${ProjectName}-${Environment}-client"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "${ProjectName}-${Environment}-${AWS::AccountId}"
      UserPoolId: !Ref UserPool

  # ===========================================================================
  # BACKEND - Lambda
  # ===========================================================================
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-lambda-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt ClassesTable.Arn
                  - !Sub "${ClassesTable.Arn}/index/*"
                  - !GetAtt BookingsTable.Arn
                  - !Sub "${BookingsTable.Arn}/index/*"
                  - !GetAtt FeedbackTable.Arn
                  - !Sub "${FeedbackTable.Arn}/index/*"
        - PolicyName: SESAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                Resource: "*"

  EmailDispatcherRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-email-dispatcher-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt ClassesTable.Arn
                  - !Sub "${ClassesTable.Arn}/index/*"
                  - !GetAtt BookingsTable.Arn
                  - !Sub "${BookingsTable.Arn}/index/*"
        - PolicyName: DynamoDBWriteClassesAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt ClassesTable.Arn
        - PolicyName: SESAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                Resource: "*"

  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-${Environment}-api"
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      MemorySize: 256
      Timeout: 30
      Environment:
        Variables:
          CLASSES_TABLE: !Ref ClassesTable
          BOOKINGS_TABLE: !Ref BookingsTable
          ENVIRONMENT: !Ref Environment
          FEEDBACK_TABLE: !Ref FeedbackTable
          ADMIN_EMAIL: ivatoth@gmail.com
          SENDER_EMAIL: noreply@doseof.today
          AWS_SES_REGION: us-east-1
      Code: lambda/api/
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  ApiFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${BookingApi}/*"

  # ===========================================================================
  # EMAIL DISPATCHER - Lambda (scheduled feedback emails)
  # ===========================================================================
  EmailDispatcherFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-${Environment}-email-dispatcher"
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt EmailDispatcherRole.Arn
      MemorySize: 256
      Timeout: 120
      Environment:
        Variables:
          CLASSES_TABLE: !Ref ClassesTable
          BOOKINGS_TABLE: !Ref BookingsTable
          SENDER_EMAIL: noreply@doseof.today
          SITE_DOMAIN: !GetAtt CloudFrontDistribution.DomainName
          AWS_SES_REGION: us-east-1
      Code: lambda/email_dispatcher/
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  EmailDispatcherScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-email-dispatcher-schedule"
      Description: "Triggers Email Dispatcher Lambda every 60 minutes to send feedback request emails"
      ScheduleExpression: "rate(60 minutes)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt EmailDispatcherFunction.Arn
          Id: EmailDispatcherTarget

  EmailDispatcherInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EmailDispatcherFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt EmailDispatcherScheduleRule.Arn

  # ===========================================================================
  # API GATEWAY
  # ===========================================================================
  BookingApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-api"
      Description: Class Booking API
      EndpointConfiguration:
        Types: [REGIONAL]

  CognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: CognitoAuth
      RestApiId: !Ref BookingApi
      Type: COGNITO_USER_POOLS
      IdentitySource: method.request.header.Authorization
      ProviderARNs:
        - !GetAtt UserPool.Arn

  # ---------------------------------------------------------------------------
  # PUBLIC: /classes
  # ---------------------------------------------------------------------------
  ClassesResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref BookingApi
      ParentId: !GetAtt BookingApi.RootResourceId
      PathPart: classes

  ClassesOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref BookingApi
      ResourceId: !Ref ClassesResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  ClassesGet:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref BookingApi
      ResourceId: !Ref ClassesResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiFunction.Arn}/invocations"

